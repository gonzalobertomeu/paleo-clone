# Infra local (ARCH-6). Se opera vía el Makefile de la raíz (ARCH-6.4).
# Servicios: frontend, backend, redis (ARCH-6.6). Puertos: 5173/3000/6379 (ARCH-6.8).
# Desarrollo dentro de contenedores con hot reload y código montado (ARCH-6.3).

services:
  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    # El frontend lee la fuente TS de `shared` vía Vite (condición `default` -> src),
    # no necesita su dist.
    command: pnpm --filter @paleo/frontend dev --host
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    # `shared` se consume en runtime desde dist: se construye antes de arrancar el watch.
    command: sh -c "pnpm --filter @paleo/shared build && pnpm --filter @paleo/backend start:dev"
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ..:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  backend_node_modules:
  redis_data:
